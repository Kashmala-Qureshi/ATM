<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="atm-machine">
    <div class="atm-header">TRUST BANK ATM</div>
    
    <!-- Screen Display Area -->
    <div class="atm-screen-container">
        <div class="atm-screen" id="screen">
            <!-- Dynamic Content via JS -->
        </div>
    </div>

    <!-- Hardware Slots for realistic look -->
    <div class="slots-container">
        <div class="hardware-slot slot-card"><div class="green-light"></div></div>
        <div class="hardware-slot slot-cash"></div>
        <div class="hardware-slot slot-receipt"></div>
    </div>
</div>

<script src="./app.js"></script>

</body>
</html>
